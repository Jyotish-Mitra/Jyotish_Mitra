<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jyotish Mitra - Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: auto;
    min-height: 100%;
    overflow-x: hidden;
    overflow-y: auto;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a0a3a 0%, #4a2a8a 50%, #7597de 100%);
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .auth-container {
    max-width: 400px;
    width: 100%;
  }

  .header {
    text-align: center;
    color: #fff;
    margin-bottom: 24px;
  }

  .header .om-symbol {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 2px 8px rgba(255,215,0,0.5));
  }

  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .header p {
    font-size: 13px;
    opacity: 0.8;
    margin-top: 6px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.3);
  }

  .tab-switch {
    display: flex;
    background: #f0edf9;
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 20px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 600;
    color: #7a6fa8;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: #fff;
    color: #4a2a8a;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #5a4a8a;
    margin-bottom: 6px;
    margin-top: 14px;
  }

  label:first-of-type { margin-top: 0; }

  input {
    width: 100%;
    padding: 12px;
    border: 1.5px solid #ddd6f3;
    border-radius: 10px;
    font-size: 15px;
    background: #faf9ff;
  }

  input:focus {
    outline: none;
    border-color: #7597de;
  }

  .primary-btn {
    width: 100%;
    padding: 14px;
    margin-top: 18px;
    background: linear-gradient(135deg, #7597de, #2b1055);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }

  .primary-btn:active { transform: scale(0.98); }
  .primary-btn:disabled { opacity: 0.6; }

  .divider {
    display: flex;
    align-items: center;
    text-align: center;
    margin: 18px 0;
    color: #aaa;
    font-size: 12px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    border-bottom: 1px solid #e5e0f5;
  }

  .divider span { padding: 0 10px; }

  .google-btn {
    width: 100%;
    padding: 12px;
    background: #fff;
    border: 1.5px solid #ddd6f3;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .google-btn:active { transform: scale(0.98); }

  .error-msg {
    background: #ffe5e5;
    color: #c0392b;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  .error-msg.visible { display: block; }

  .info-msg {
    background: #e5f5ff;
    color: #1a6a9e;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  .info-msg.visible { display: block; }
</style>
</head>
<body>

<div class="auth-container">
  <div class="header">
    <span class="om-symbol">🕉️</span>
    <h1>Jyotish Mitra</h1>
    <p>Vedic Astrology — Sahi Calculation, Sahi Marg-darshan</p>
  </div>

  <div class="card">
    <div class="tab-switch">
      <button class="tab-btn active" id="loginTab">Login</button>
      <button class="tab-btn" id="signupTab">Naya Khata</button>
    </div>

    <form id="authForm">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="aapka@email.com" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required minlength="6">

      <button type="submit" class="primary-btn" id="submitBtn">Login Karein</button>
    </form>

    <div class="divider"><span>YA</span></div>

    <button class="google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.85 2.08-1.81 2.72v2.26h2.92c1.71-1.57 2.69-3.88 2.69-6.62z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.92-2.26c-.8.55-1.84.86-3.04.86-2.33 0-4.32-1.57-5.03-3.71H.96v2.33C2.44 16.05 5.48 18 9 18z"/>
        <path fill="#FBBC05" d="M3.97 10.71c-.18-.55-.28-1.13-.28-1.71s.1-1.16.28-1.71V4.96H.96C.35 6.17 0 7.55 0 9s.35 2.83.96 4.04l3.01-2.33z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 1.95.96 4.96l3.01 2.33C4.68 5.15 6.67 3.58 9 3.58z"/>
      </svg>
      Google Se Login Karein
    </button>

    <div class="error-msg" id="errorMsg"></div>
    <div class="info-msg" id="infoMsg"></div>
  </div>
</div>

<script type="module">
  import {
    auth,
    googleProvider,
    signInWithPopup,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged,
  } from "./firebase-config.js";

  const loginTab = document.getElementById("loginTab");
  const signupTab = document.getElementById("signupTab");
  const authForm = document.getElementById("authForm");
  const submitBtn = document.getElementById("submitBtn");
  const googleBtn = document.getElementById("googleBtn");
  const errorMsg = document.getElementById("errorMsg");
  const infoMsg = document.getElementById("infoMsg");

  let mode = "login"; // ya "signup"

  // Agar already logged in hai to seedha app pe bhej do
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = "/app.html";
    }
  });

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add("visible");
    infoMsg.classList.remove("visible");
  }

  function showInfo(msg) {
    infoMsg.textContent = msg;
    infoMsg.classList.add("visible");
    errorMsg.classList.remove("visible");
  }

  function clearMsgs() {
    errorMsg.classList.remove("visible");
    infoMsg.classList.remove("visible");
  }

  loginTab.addEventListener("click", () => {
    mode = "login";
    loginTab.classList.add("active");
    signupTab.classList.remove("active");
    submitBtn.textContent = "Login Karein";
    clearMsgs();
  });

  signupTab.addEventListener("click", () => {
    mode = "signup";
    signupTab.classList.add("active");
    loginTab.classList.remove("active");
    submitBtn.textContent = "Khata Banayein";
    clearMsgs();
  });

  function friendlyError(err) {
    const code = err.code || "";
    if (code.includes("user-not-found") || code.includes("invalid-credential")) {
      return "Email ya password galat hai.";
    }
    if (code.includes("email-already-in-use")) {
      return "Ye email pehle se registered hai. Login try karein.";
    }
    if (code.includes("weak-password")) {
      return "Password kam se kam 6 character ka hona chahiye.";
    }
    if (code.includes("invalid-email")) {
      return "Email sahi format mein nahi hai.";
    }
    return "Kuch gadbad hui: " + err.message;
  }

  authForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearMsgs();
    submitBtn.disabled = true;

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      if (mode === "signup") {
        await createUserWithEmailAndPassword(auth, email, password);
      } else {
        await signInWithEmailAndPassword(auth, email, password);
      }
      // onAuthStateChanged khud redirect kar dega
    } catch (err) {
      showError(friendlyError(err));
      submitBtn.disabled = false;
    }
  });

  googleBtn.addEventListener("click", async () => {
    clearMsgs();
    try {
      await signInWithPopup(auth, googleProvider);
    } catch (err) {
      showError(friendlyError(err));
    }
  });
</script>

</body>
</html>
